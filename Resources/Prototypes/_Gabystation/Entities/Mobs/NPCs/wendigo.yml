- type: entity
  name: Wendigo
  description: A manhunter entity of the dark woods. Although its main diet is humanoids, it won't pass a meal at anything that comes across it.
  parent: BaseMobSlaughterDemon
  id: MobWendigo
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Gabystation/Mobs/Demons/wendigo.rsi
    offset: 0,0.4
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: alive
  - type: MobThresholds
    thresholds:
      0: Alive
      700: Dead # Bossfight(?)
  - type: SlowOnDamage
    speedModifierThresholds:
      350: 1.6 # Ele fica mais rápido quando machucado (É pra ficar :shrug:)
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 8
  - type: MeleeWeapon
    soundHit:
      path: /Audio/_Gabystation/Weapons/Xeno/monster_attack.ogg
    animation: WeaponArcPunch
    damage:
      types:
        Slash: 25
        Structural: 80
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 8.5
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: UseDelay
    delay: 1
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 15500
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Tag
    tags:
    - CannotSuicide
    - FootstepSound
    - DoorBumpOpener
  - type: Reflect
    reflectProb: 0.75
    reflects:
      - Energy
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepThud
  - type: PointLight
    radius: 70 # Avisa todo mundo da presença dele.
    energy: 2.5
    color: "#ff4242"
    castShadows: false
  - type: AnnounceOnSpawn
    message: wendigo-has-spawned
    sender: wendigo-has-spawned-sender
    sound:
      path: /Audio/_Gabystation/Voice/Wendigo_Cry_3.ogg
    color: maroon