- type: entity
  id: PartPermaAscended
  parent: [BaseItem, BasePart]
  name: "ascended perma body part"
  abstract: true
  components:
  - type: Icon # Shitmed Change
    sprite: _BRatBites/Entities/Mobs/PermaSpecies/parts.rsi #E:\Rat_Bite_Station_14\Resources\Textures\Mobs\Species\Human\parts.rsi
  - type: BodyPart # Shitmed Change
    species: PermaAscended
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 20

